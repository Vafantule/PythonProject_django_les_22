{% extends "catalog/base.html" %}
{% block title %}Удалить запись блога{% endblock %}
{% block content %}
<div class="container mt-5">
    <h2>Удалить запись блога</h2>
    <div class="alert alert-danger">
        Вы уверены, что хотите удалить запись <strong>{{ blog.title }}</strong>?
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'blog:blog_detail' blog.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
