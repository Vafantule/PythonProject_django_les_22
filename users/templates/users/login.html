{% extends "catalog/base.html" %}
{% block title %}Вход пользователя{% endblock %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Войти</button>
        <a href="{% url 'users:user_registration' %}" class="btn btn-link ms-2">Регистрация</a>
    </form>
    {% if messages %}
        <ul class="mt-3">
            {% for message in messages %}
                <li class="text-danger">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
{% endblock %}
