{% extends "catalog/base.html" %}
{% block title %}Удаление пользователя{% endblock %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Удалить пользователя</h2>
    <div class="alert alert-danger">
        <p>Вы уверены, что хотите удалить пользователя <strong>{{ user.email }}</strong>?</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'users:user_list' %}" class="btn btn-secondary ms-2">Отмена</a>
    </form>
</div>
{% endblock %}
