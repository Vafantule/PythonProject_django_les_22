{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Контакты</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Контактная информация</h1>
    {% if success %}
        <div class="alert alert-success">Спасибо, ваша заявка отправлена!</div>
    {% endif %}
    <form method="post" class="mb-4">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_name" class="form-label">Имя</label>
            <input type="text" class="form-control" id="id_name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" class="form-control" id="id_email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="id_message" class="form-label">Сообщение</label>
            <textarea class="form-control" id="id_message" name="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
    <a href="{% url 'home' %}" class="btn btn-secondary">На главную</a>
</div>
</body>
</html>
